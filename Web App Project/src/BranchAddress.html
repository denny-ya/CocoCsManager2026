<!-- 영업점 주소록 화면 -->
<div id="branchAddressView" style="display: none;">
  <div class="header-with-back">
    <button class="icon-btn" onclick="showMainView()">
      <span class="material-icons">arrow_back</span>
    </button>
    <h2 class="view-title">영업점 주소록</h2>
  </div>

  <div class="bs-section">
    <div class="search-box">
      <!-- 동적으로 생성될 서비스 선택 칩 컨테이너 -->
      <div class="part-chips" id="addressPartChips">
        <!-- JavaScript에서 동적으로 생성됨 -->
      </div>
      
      <!-- 검색어 입력부 -->
      <div class="search-input-group">
        <input type="text" id="addressSearchInput" placeholder="영업점 입력 (예: 가락점)" onkeypress="if(event.key==='Enter') handleAddressSearch()">
        <button class="btn-primary search-btn-address" onclick="handleAddressSearch()">
          <span class="material-icons">search</span>
        </button>
      </div>
    </div>

    <!-- 검색 결과 영역 -->
    <div id="addressResults" class="results-container">
      <div class="empty-state">
        <span class="material-icons">location_on</span>
        <p>검색할 영업점 이름을 입력해주세요</p>
      </div>
    </div>
  </div>
</div>
