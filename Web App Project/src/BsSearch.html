<!-- BS 및 리워크 검색 화면 -->
<div id="bsSearchView" style="display: none;">
  <div class="header-with-back">
    <button class="icon-btn" onclick="showMainView()">
      <span class="material-icons">arrow_back</span>
    </button>
    <h2 class="view-title">BS 및 리워크 검색</h2>
  </div>

  <!-- 탭 바 -->
  <div class="tabs">
    <div class="tab-item active" id="tabVin" onclick="switchBsTab('vin')">차대번호 검색</div>
    <div class="tab-item" id="tabMaster" onclick="switchBsTab('master')">마스터 통계</div>
  </div>

  <!-- 탭1: 차대번호 검색 섹션 -->
  <div id="bsVinSection" class="bs-section">
    <div class="search-box">
      <div class="part-chips" id="bsVinPartChips">
        <!-- JavaScript에서 동적으로 생성됨 -->
      </div>
      <div class="search-input-group">
        <input type="text" id="bsVinInput" placeholder="차대번호 입력 (예: HYM322...)" onkeypress="if(event.key==='Enter') handleBsSearch()">
        <button class="barcode-btn" onclick="triggerCamera()" title="바코드 촬영">
          <span class="material-icons">photo_camera</span>
        </button>
        <input type="file" id="directBarcodeCamera" accept="image/*" capture="environment" style="display:none"
          onchange="handleDirectBarcodeFile(this)">
        <button class="search-btn" onclick="handleBsSearch()">
          <span class="material-icons">search</span>
        </button>
      </div>
    </div>

    <div id="bsVinResults" class="results-container">
      <div class="empty-state">
        <span class="material-icons">manage_search</span>
        <p>차대번호를 입력하고 검색해주세요</p>
      </div>
    </div>
  </div>

  <!-- 탭2: 마스터 통계 섹션 -->
  <div id="bsMasterSection" class="bs-section" style="display: none;">
    <div class="search-box">
      <div class="part-chips" id="bsMasterPartChips">
        <!-- JavaScript에서 동적으로 생성됨 -->
      </div>
      <div class="search-input-group">
        <input type="text" id="bsMasterInput" placeholder="마스터 이름 입력 (예: 홍길동)" onkeypress="if(event.key==='Enter') handleMasterStatsSearch()">
        <button class="search-btn" onclick="handleMasterStatsSearch()">
          <span class="material-icons">bar_chart</span>
        </button>
      </div>
    </div>

    <div id="bsMasterResults" class="results-container">
      <div class="empty-state">
        <span class="material-icons">analytics</span>
        <p>마스터 이름을 입력하고 통계를 조회하세요</p>
      </div>
    </div>
  </div>
</div>

<!-- 점검 완료 처리 모달 -->
<div id="completeModal" class="modal-overlay" style="display: none;">
  <div class="modal-card">
    <h3 class="modal-title">점검 완료 처리</h3>
    <p class="modal-vin" id="modalVinDisplay"></p>

    <div class="checkbox-group">
      <p class="modal-label">처리구분 선택 (1개 이상)</p>
      <label class="check-item">
        <input type="checkbox" id="checkInspection"> 점검
      </label>
      <label class="check-item">
        <input type="checkbox" id="checkReplace"> 교체
      </label>
      <label class="check-item">
        <input type="checkbox" id="checkTransfer"> 이관
      </label>
      <label class="check-item">
        <input type="checkbox" id="checkDisposal"> 폐기
      </label>
    </div>

    <div class="modal-buttons">
      <button class="modal-btn cancel-btn" onclick="closeCompleteModal()">취소</button>
      <button class="modal-btn confirm-btn" onclick="executeComplete()">완료 처리</button>
    </div>
  </div>
</div>

<!-- 바코드 분석을 위한 숨겨진 캔버스 (Native BarcodeDetector 방식용) -->
<canvas id="barcodeCanvas" style="display: none;"></canvas>
