<script>
  function showLoading() {
    document.getElementById('loading').style.display = 'flex';
  }

  function hideLoading() {
    document.getElementById('loading').style.display = 'none';
  }

  function showLogin() {
    document.getElementById('authWrapper').style.display = 'flex';
    document.getElementById('loginView').style.display = 'block';
    document.getElementById('changePwView').style.display = 'none';
    document.getElementById('mainView').style.display = 'none';
  }

  function showChangePassword() {
    document.getElementById('authWrapper').style.display = 'flex';
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('changePwView').style.display = 'block';
    document.getElementById('mainView').style.display = 'none';
  }

  function showMain(userName) {
    document.getElementById('authWrapper').style.display = 'none';
    document.getElementById('mainView').style.display = 'block';
    document.getElementById('bsSearchView').style.display = 'none';
    document.getElementById('branchAddressView').style.display = 'none';
    document.getElementById('deliveryView').style.display = 'none';

    if (userName) {
      document.getElementById('userNameDisplay').innerText = userName;
    }
    renderMenu();

    // 뒤로가기용 히스토리 추가
    if (history.state?.view !== 'main') {
      history.pushState({ view: 'main' }, 'Main');
    }
  }

  const MENU_ITEMS = [
    { id: 'bs', title: 'BS 및 리워크', desc: '검색을 통한 업무 조회', icon: 'search', color: '#0051A2', action: () => showBsSearchView() },
    { id: 'address', title: '영업점 주소록', desc: '전국 영업점 및 지사 연락처', icon: 'location_on', color: '#E65100', action: () => showBranchAddressView() },
    { id: 'parts', title: '부품 탈거 관리', desc: '회수 부품 및 탈거 정보 관리', icon: 'handyman', color: '#2E7D32' },
    { id: 'delivery', title: '배차 관리', desc: '실시간 배차 및 이동 현황', icon: 'local_shipping', color: '#6A1B9A', action: () => showDeliveryView() },
    { id: 'stats', title: '실적 및 통계', desc: '일일/월간 실적 대시보드', icon: 'bar_chart', color: '#1565C0' },
    { id: 'guide', title: '업무 가이드', desc: '표준 업무 절차 및 매뉴얼', icon: 'menu_book', color: '#00838F' }
  ];

  function renderMenu() {
    console.log('Rendering menu based on permissions');
    const listBody = document.getElementById('menuList');
    listBody.innerHTML = '';

    MENU_ITEMS.forEach((item) => {
      // 권한 체크
      let hasAccess = false;
      if (userPermissions) {
        if (item.id === 'bs') {
          hasAccess = userPermissions.bs && userPermissions.bs.some(p => p === 'O' || p === 'o');
        } else if (item.id === 'delivery') {
          hasAccess = userPermissions.delivery && userPermissions.delivery.some(p => p === 'O' || p === 'o');
        } else {
          hasAccess = userPermissions[item.id] === 'O' || userPermissions[item.id] === 'o';
        }
      }

      if (!hasAccess) return;

      const card = document.createElement('div');
      card.className = 'menu-card';

      if (item.action) {
        card.onclick = item.action;
      } else {
        card.onclick = () => alert(item.title + ' 기능을 준비 중입니다.');
      }

      card.innerHTML = `
        <div class="menu-card-left-bar" style="background-color: ${item.color}"></div>
        <div class="menu-card-content">
          <div class="menu-icon-container">
            <span class="material-icons" style="color: ${item.color}">${item.icon}</span>
          </div>
          <div class="menu-text-container">
            <h3 class="menu-title">${item.title}</h3>
            <p class="menu-desc">${item.desc}</p>
          </div>
          <span class="material-icons menu-arrow">chevron_right</span>
        </div>
      `;
      listBody.appendChild(card);
    });
  }

  // ── BS 검색 관련 로직 ──
  let userPermissions = null; // 모든 메뉴 권한 객체
  let currentBsPart = '';
  let currentBsMasterPart = '';
  let currentVinForComplete = '';
  let currentAddressPart = ''; // 영업점 주소록용 파트 보관

  function showBranchAddressView() {
    // 재진입 시 항상 검색 상태 초기화
    const searchInput = document.getElementById('addressSearchInput');
    if (searchInput) {
      searchInput.value = '';
    }
    
    document.getElementById('addressResults').innerHTML = `
      <div class="empty-state">
        <span class="material-icons">location_on</span>
        <p>검색할 영업점 이름을 입력해주세요</p>
      </div>`;

    // 권한별 필터 칩 렌더링
    if (userPermissions && userPermissions.address) {
      renderAddressServiceChips(userPermissions.address);
    }

    document.getElementById('mainView').style.display = 'none';
    document.getElementById('branchAddressView').style.display = 'block';
    document.getElementById('deliveryView').style.display = 'none';

    if (history.state?.view !== 'branchAddress') {
      history.pushState({ view: 'branchAddress' }, 'Branch Address');
    }
  }

  // 주소 클립보드 복사 함수 추가
  function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => {
        alert('주소가 클립보드에 복사되었습니다.');
      }).catch(err => {
        console.error('복사 실패', err);
        fallbackCopyTextToClipboard(text);
      });
    } else {
      fallbackCopyTextToClipboard(text);
    }
  }

  function fallbackCopyTextToClipboard(text) {
    var textArea = document.createElement("textarea");
    textArea.value = text;
    textArea.style.top = "0";
    textArea.style.left = "0";
    textArea.style.position = "fixed";
    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();
    try {
      document.execCommand('copy');
      alert('주소가 클립보드에 복사되었습니다.');
    } catch (err) {
      console.error('Fallback 복사 실패', err);
      alert('주소 복사에 실패했습니다.');
    }
    document.body.removeChild(textArea);
  }

  function renderAddressServiceChips(addressPerm) {
    const container = document.getElementById('addressPartChips');
    container.innerHTML = '';
    
    // address 권한이 배열 형태('bs' 권한의 복사 여부)인지 확인. 
    // 설계상 BS 권한 배열과 동일한 방식으로 작동하도록 작성(또는 필요시 수정)
    // 원본 checkLogin 구조상 address는 단일값이지만, bs.서비스1~4와 통일성을 위해 bs 권한 배열을 대신 사용하도록 강제하거나, 향후 서버측 수정에 대비.
    // 여기서는 화면 기획서에 '전체/서비스1/서비스2...' 가 있으므로 userPermissions.bs 를 기반으로 그리도록 함. (요구사항: "BS 및 리워크와 동일")
    const bsPerms = userPermissions.bs || [];
    
    const activeServices = [];
    bsPerms.forEach((p, i) => {
      if (p === 'O' || p === 'o') {
        activeServices.push({ id: `서비스${i + 1}`, label: `서비스${i + 1}` });
      }
    });

    if (activeServices.length === 0) {
      container.innerHTML = '<span style="font-size:12px; color:#999;">권한 없음</span>';
      return;
    }

    let html = '';
    const showAll = activeServices.length === 4;

    if (showAll) {
      html += `<span class="chip active" onclick="selectAddressPart(this, '')">전체</span>`;
    }

    activeServices.forEach((s, idx) => {
      const isActive = (!showAll && idx === 0) ? 'active' : '';
      html += `<span class="chip ${isActive}" onclick="selectAddressPart(this, '${s.id}')">${s.label}</span>`;
    });
    
    if (activeServices.length === 4) {
      currentAddressPart = '';
    } else {
      currentAddressPart = activeServices[0].id;
    }

    container.innerHTML = html;
  }

  function selectAddressPart(el, val) {
    document.querySelectorAll('#addressPartChips .chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    currentAddressPart = val;
  }

  function handleAddressSearch() {
    const keyword = document.getElementById('addressSearchInput').value.trim();
    if (!keyword) { alert('영업점 이름을 입력해주세요.'); return; }
    
    const container = document.getElementById('addressResults');
    container.innerHTML = `
      <div class="empty-state">
        <span class="material-icons">search</span>
        <p>${keyword} (${currentAddressPart || '전체'}) 검색 중입니다...</p>
      </div>`;
      
    showLoading();

    const bsSearchView = document.getElementById('bsSearchView');
    if (bsSearchView && bsSearchView.style.display !== 'none') {
      bsSearchView.style.display = 'none';
      document.getElementById('bsVinResults').innerHTML = '';
      document.getElementById('bsMasterResults').innerHTML = '';
    }

    google.script.run
      .withSuccessHandler(function(results) {
        hideLoading();
        renderBranchAddressResults(results, keyword);
      })
      .withFailureHandler(function(err) {
        hideLoading();
        container.innerHTML = `
          <div class="empty-state" style="color:#d32f2f;">
            <span class="material-icons">error_outline</span>
            <p>서버 조회 중 오류가 발생했습니다.<br>${err}</p>
          </div>`;
      })
      .searchBranchAddress(keyword, currentAddressPart);
  }

  function renderBranchAddressResults(results, keyword) {
    const container = document.getElementById('addressResults');
    
    if (results && results.error) {
       container.innerHTML = `
         <div class="empty-state" style="color:#d32f2f;">
           <span class="material-icons">error_outline</span>
           <p>오류: ${results.error}</p>
         </div>`;
       return;
    }

    if (!results || results.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <span class="material-icons">location_off</span>
          <p>분류 '<b>${currentAddressPart || '전체'}</b>'에 해당하는<br>'<b>${keyword}</b>' 검색결과가 없습니다.</p>
        </div>`;
      return;
    }

    let html = '';
    
    results.forEach(branch => {
      // 차량 리스트 생성 도우미
      const getListHtml = (list, isRework) => {
        if (!list || list.length === 0) return '';
        return list.map(item => `
          <div class="vehicle-item" onclick="executeBSearchFromAddress('${item.vin}')" style="background: white; border-radius: 4px; padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e0e0e0; cursor: pointer;">
            <div class="vehicle-info" style="display: flex; align-items: center; gap: 8px;">
              <span class="badge" style="padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; ${isRework ? 'background: #e3f2fd; color: #1976d2;' : 'background: #f5f5f5; color: #757575;'}">${item.cartVersion || '무관'}</span>
              <span class="vin-text" style="font-size: 13px; font-weight: 500; color: #333;">${item.vin}</span>
            </div>
            <div class="status-icon">
              ${item.completed 
                ? '<span class="material-icons" style="color:#4CAF50; font-size: 18px;">check_circle</span>' 
                : (isRework 
                    ? '<span class="material-icons" style="color:#757575; font-size: 18px;">build</span>' 
                    : '<span class="material-icons" style="color:#757575; font-size: 18px;">directions_car</span>')
              }
            </div>
          </div>
        `).join('');
      };

      html += `
        <div class="card branch-card" style="margin-bottom:20px;">
          <div class="branch-card-header">
            <span class="material-icons header-icon">storefront</span>
            <h3>${branch.name}</h3>
          </div>
          
          <div class="branch-info-row">
            <span class="info-label">주소</span>
            <span class="info-content address-content">
               ${branch.address}
               <button class="icon-btn-small" onclick="copyToClipboard('${branch.address}')" style="border:none;background:none;color:#757575;cursor:pointer;padding:0;">
                 <span class="material-icons" style="font-size:16px;">launch</span>
               </button>
            </span>
          </div>
          
          <div class="branch-info-row">
            <span class="info-label">영업점 번호</span>
            <span class="info-content"><a href="tel:${branch.tel}">${branch.tel}</a></span>
          </div>
          
          <div class="branch-info-row">
            <span class="info-label">점장 번호</span>
            <span class="info-content"><a href="tel:${branch.managerTel}">${branch.managerTel}</a></span>
          </div>
          
          <div class="branch-stats-section">
            <div class="stats-header">
              <span class="material-icons" style="font-size:16px;">assignment</span>
              <span>${branch.name} 작업 현황</span>
            </div>
            
            <div class="total-progress" style="margin-bottom:12px;">
              <div class="progress-title" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <strong style="font-size: 13px; color: #333;">전체 완료율 <span style="color: #007bff; font-size: 14px;">${branch.stats.completionRate}%</span></strong>
                <span class="progress-count" style="font-size: 12px; color: #757575;">${branch.stats.completedTarget} / ${branch.stats.totalTarget}</span>
              </div>
              <div class="progress-bar-container" style="background: #e0e0e0; height: 4px; border-radius: 2px;">
                <div class="progress-bar-fill" style="background: #007bff; height: 100%; border-radius: 2px; width: ${branch.stats.completionRate}%;"></div>
              </div>
            </div>
            
            <div class="stats-grid">
              <div class="stat-box">
                <div class="stat-label bs-label" style="font-size:11px;color:#d32f2f;font-weight:bold;margin-bottom:4px;">BS 점검대상</div>
                <div class="stat-value" style="font-size:15px;color:#333;"><strong>${branch.stats.bsRate}%</strong></div>
                <div class="stat-count" style="font-size:11px;color:#999;margin-top:2px;">${branch.stats.bsCompleted}/${branch.stats.bsTotal}</div>
              </div>
              <div class="stat-box">
                <div class="stat-label rework-label" style="font-size:11px;color:#0d47a1;font-weight:bold;margin-bottom:4px;">리워크</div>
                <div class="stat-value" style="font-size:15px;color:#333;"><strong>${branch.stats.reworkRate}%</strong></div>
                <div class="stat-count" style="font-size:11px;color:#999;margin-top:2px;">${branch.stats.reworkCompleted}/${branch.stats.reworkTotal}</div>
              </div>
            </div>
            
            <div class="vehicle-lists address-vehicle-lists">
              <div class="list-section">
                <div class="list-title bs-label" style="font-size:11px;font-weight:bold;color:#d32f2f;margin-bottom:8px;">BS 점검대상 (${branch.stats.bsTotal})</div>
                ${getListHtml(branch.stats.bsList, false)}
                ${getListHtml(branch.stats.bsDoneList, false)}
              </div>
              
              <div class="list-section" style="margin-top: 16px;">
                <div class="list-title rework-label" style="font-size:11px;font-weight:bold;color:#1976d2;margin-bottom:8px;">리워크 (${branch.stats.reworkTotal})</div>
                ${getListHtml(branch.stats.reworkList, true)}
                ${getListHtml(branch.stats.reworkDoneList, true)}
              </div>
            </div>
          </div>
        </div>
        <a href="https://map.naver.com/v5/search/${encodeURIComponent(branch.address)}" target="_blank" class="btn-naver" style="display: block; text-decoration: none; margin-top: 10px; margin-bottom: 20px; width: 100%; box-sizing: border-box; text-align: center;">
          <span style="vertical-align: middle;">네이버 지도 앱 열기${results.length > 1 ? ` (${branch.name})` : ''}</span>
        </a>
      `;
    });
    
    container.innerHTML = html;
  }

  /**
   * 영업점 주소록 화면에서 차대번호 클릭 시 BS 화면으로 이동하여 검색
   */
  function executeBSearchFromAddress(vin) {
    if (!vin) return;
    
    // 권한 검사 (BS 메뉴 권한이 있는지 확인)
    if (!userPermissions || !userPermissions.bs || userPermissions.bs.length === 0) {
      alert('BS 메뉴에 접근할 권한이 없습니다.');
      return;
    }
    
    // BS 검색 화면으로 전환
    showBsSearchView();
    
    // 약간의 딜레이 후 검색어 세팅 및 검색 실행 (화면 렌더링 보장)
    setTimeout(() => {
      const inputEl = document.getElementById('bsVinInput');
      if (inputEl) {
        inputEl.value = vin;
        handleBsSearch();
      }
    }, 150);
  }

  function showBsSearchView() {
    // 진입 시 초기화
    document.getElementById('bsVinInput').value = '';
    document.getElementById('bsMasterInput').value = '';
    document.getElementById('bsVinResults').innerHTML = `
      <div class="empty-state">
        <span class="material-icons">manage_search</span>
        <p>차대번호를 입력하고 검색해주세요</p>
      </div>`;
    document.getElementById('bsMasterResults').innerHTML = `
      <div class="empty-state">
        <span class="material-icons">analytics</span>
        <p>마스터 이름을 입력하고 통계를 조회하세요</p>
      </div>`;

    // 탭 초기화
    switchBsTab('vin');

    // 권한별 필터 칩 렌더링
    if (userPermissions && userPermissions.bs) {
      renderServiceChips(userPermissions.bs);
    }

    document.getElementById('mainView').style.display = 'none';
    document.getElementById('bsSearchView').style.display = 'block';
    document.getElementById('deliveryView').style.display = 'none';

    // 뒤로가기용 히스토리 추가
    if (history.state?.view !== 'bsSearch') {
      history.pushState({ view: 'bsSearch' }, 'BS Search');
    }
  }

  /**
   * 권한별 서비스 파트 칩 생성
   */
  function renderServiceChips(bsPerms) {
    const vinContainer = document.getElementById('bsVinPartChips');
    const masterContainer = document.getElementById('bsMasterPartChips');

    vinContainer.innerHTML = '';
    masterContainer.innerHTML = '';

    // 'O' 표시된 서비스 파트 찾기
    const activeServices = [];
    bsPerms.forEach((p, i) => {
      if (p === 'O' || p === 'o') {
        activeServices.push({ id: `서비스${i + 1}`, label: `서비스${i + 1}` });
      }
    });

    if (activeServices.length === 0) {
      vinContainer.innerHTML = '<span style="font-size:12px; color:#999;">권한 없음</span>';
      masterContainer.innerHTML = '<span style="font-size:12px; color:#999;">권한 없음</span>';
      return;
    }

    // UI 생성 함수
    const generateHtml = (isMaster) => {
      let html = '';
      // 4개 모두 권한이 있는 경우에만 '전체' 표시 (사용자 요구사항)
      const showAll = activeServices.length === 4;

      if (showAll) {
        html += `<span class="chip active" onclick="${isMaster ? 'selectBsMasterPart' : 'selectBsPart'}(this, '')">전체</span>`;
      }

      activeServices.forEach((s, idx) => {
        // 권한이 1개뿐이거나(showAll이 false이고 전용버튼만 있을 때) 첫번째 버튼을 활성화할지 결정
        // 4개 다 있을 때 '전체'가 active이므로 버튼들은 비활성. 1~3개일 때는 첫번째 버튼을 active로.
        const isActive = (!showAll && idx === 0) ? 'active' : '';
        html += `<span class="chip ${isActive}" onclick="${isMaster ? 'selectBsMasterPart' : 'selectBsPart'}(this, '${s.id}')">${s.label}</span>`;
      });
      return html;
    };

    // 초기 상태값 설정
    if (activeServices.length === 4) {
      currentBsPart = '';
      currentBsMasterPart = '';
    } else {
      currentBsPart = activeServices[0].id;
      currentBsMasterPart = activeServices[0].id;
    }

    vinContainer.innerHTML = generateHtml(false);
    masterContainer.innerHTML = generateHtml(true);
  }

  function showMainView() {
    // 하드웨어/브라우저 뒤로가기 버튼과 동일하게 동작하도록 history.back() 호출
    // onpopstate에서 이를 감지하여 showMain()을 실행하게 됨
    history.back();
  }

  function switchBsTab(tab) {
    const isVin = tab === 'vin';
    document.getElementById('bsVinSection').style.display = isVin ? 'block' : 'none';
    document.getElementById('bsMasterSection').style.display = isVin ? 'none' : 'block';
    document.getElementById('tabVin').className = `tab-item ${isVin ? 'active' : ''}`;
    document.getElementById('tabMaster').className = `tab-item ${!isVin ? 'active' : ''}`;
  }

  function selectBsPart(el, val) {
    document.querySelectorAll('#bsVinPartChips .chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    currentBsPart = val;
  }

  function selectBsMasterPart(el, val) {
    document.querySelectorAll('#bsMasterPartChips .chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    currentBsMasterPart = val;
  }

  // 차대번호 검색
  function handleBsSearch() {
    try {
      const keyword = document.getElementById('bsVinInput').value.trim();
      if (!keyword) { alert('차대번호를 입력해주세요.'); return; }

      const container = document.getElementById('bsVinResults');
      container.innerHTML = '<div class="empty-state"><p>조회 중...</p></div>';

      showLoading();
      google.script.run
        .withSuccessHandler(function (results) {
          hideLoading();
          renderBsResults(results);
        })
        .withFailureHandler(function (err) {
          hideLoading();
          alert('검색 중 오류 발생: ' + err);
        })
        .searchBS(keyword, currentBsPart);

      hideLoading();

  /**

  function renderBsResults(results) {
    const container = document.getElementById('bsVinResults');
    container.innerHTML = '';

    // 서버에서 에러 객체가 반환된 경우 처리
    if (results && results.error) {
      container.innerHTML = `
        <div class="empty-state">
          <span class="material-icons">warning</span>
          <p>검색 오류: ${results.error}</p>
        </div>
      `;
      return;
    }

    if (!results || !Array.isArray(results) || results.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <span class="material-icons">search_off</span>
          <p>검색 결과가 없습니다.</p>
        </div>
      `;
      return;
    }

    results.forEach(item => {
      const isCompleted = item.completed && item.completed.includes('완료');
      const isRework = item.bsTarget && item.bsTarget.includes('리워크');
      const isTarget = item.bsTarget === 'O' || isRework;
      const isNonTarget = item.bsTarget === 'X';

      let badgesHtml = '<div class="status-badges-container">';

      // 1. 점검 상태 배지 (완료 vs 미완료 대상 vs 비대상)
      if (isCompleted) {
        badgesHtml += `

            <span class="material-icons" style="font-size:18px; vertical-align:middle; margin-right:6px;">verified</span>점검 완료 (${item.completedDate || '날짜미상'})

      } else if (isNonTarget) {
        badgesHtml += `
          <div class="status-badge badge-non-target">

      }

      // 2. 리워크 배지 (완료 여부와 상관없이 타겟이면 노출)
      if (isRework) {
        badgesHtml += `
          <div class="status-badge badge-rework">

        <div class="info-row"><span class="info-label">카트버전</span><span class="info-value">${item.cartVersion}</span></div>

  // 메모 저장
  function saveMemoLocal(vin) {

      if (!confirm('비어있는 메모를 저장하시겠습니까?')) return;
    }

    showLoading();
    google.script.run
      .withSuccessHandler(function (res) {
        hideLoading();
        alert('메모가 저장되었습니다.');

  // 완료 처리 모달
  function openCompleteModal(vin) {
    currentVinForComplete = vin;
    document.getElementById('modalVinDisplay').innerText = '차대번호: ' + vin;

    // 이전에 체크된 항목 초기화 (사진 4 대응)
    document.getElementById('checkInspection').checked = false;
    document.getElementById('checkReplace').checked = false;
    document.getElementById('checkTransfer').checked = false;
    document.getElementById('checkDisposal').checked = false;

    document.getElementById('completeModal').style.display = 'flex';
  }

  function closeCompleteModal() {
    document.getElementById('completeModal').style.display = 'none';
  }

  function executeComplete() {
    const memo = document.getElementById('memo_' + currentVinForComplete).value;
    const processTypes = {
      inspection: document.getElementById('checkInspection').checked,
      replace: document.getElementById('checkReplace').checked,
      transfer: document.getElementById('checkTransfer').checked,
      disposal: document.getElementById('checkDisposal').checked
    };

    if (!processTypes.inspection && !processTypes.replace && !processTypes.transfer && !processTypes.disposal) {
      alert('처리 구분을 1개 이상 선택해주세요.');
      return;
    }

    closeCompleteModal();
    showLoading();
    google.script.run
      .withSuccessHandler(function (res) {
        hideLoading();
        if (res.success) {
          alert('완료 처리되었습니다.');
          handleBsSearch(); // 내 결과 새로고침
          
          // 영업점 주소록 화면도 백그라운드에서 동시 새로고침 (열려있을 경우 대비)
          const addrInput = document.getElementById('addressSearchInput');
          if (addrInput && addrInput.value.trim()) {
            handleAddressSearch();
          }
        } else {
          alert(res.message);
        }
      })
      .withFailureHandler(function (err) {
        hideLoading();
        alert('처리 실패: ' + err);
      })
      .markAsComplete(currentVinForComplete, memo, processTypes);
  }

  function handleLogin() {
    const empId = document.getElementById('empId').value;
    const pw = document.getElementById('pw').value;

    if (!empId || !pw) {
      alert('사원번호와 비밀번호를 입력해주세요.');
      return;
    }

    showLoading();
    google.script.run
      .withSuccessHandler(function (result) {
        hideLoading();
        if (result.success) {
          userPermissions = result.permissions || [];
          showMain(result.userName);
        } else {
          alert(result.message);
        }
      })
      .withFailureHandler(function (err) {
        hideLoading();
        alert('에러가 발생했습니다: ' + err);
      })
      .checkLogin(empId, pw);
  }

  function handleChangePassword() {
    const empId = document.getElementById('changeEmpId').value;
    const oldPw = document.getElementById('oldPw').value;
    const newPw = document.getElementById('newPw').value;
    const confirmPw = document.getElementById('confirmPw').value;

    if (!empId || !oldPw || !newPw || !confirmPw) {
      alert('모든 필드를 입력해주세요.');
      return;
    }

    if (newPw !== confirmPw) {
      alert('새 비밀번호와 확인 비밀번호가 일치하지 않습니다.');
      return;
    }

    showLoading();
    google.script.run
      .withSuccessHandler(function (result) {
        hideLoading();
        if (result.success) {
          alert(result.message);
          showLogin();
        } else {
          alert(result.message);
        }
      })
      .withFailureHandler(function (err) {
        hideLoading();
        alert('에러가 발생했습니다: ' + err);
      })
      .updatePassword(empId, oldPw, newPw);
  }

  /**
   * 로그아웃
   */
  function handleLogout() {
    if (!confirm('로그아웃 하시겠습니까?')) return;
    userPermissions = null;
    showLogin();
    // 히스토리 초기화 (선택 사항)
    history.replaceState({ view: 'login' }, 'Login');
  }

  /**
   * Enter 키 이벤트 처리
   */
  function setupEnterKey() {
    const inputs = [
      { id: 'empId', action: handleLogin },
      { id: 'pw', action: handleLogin },
      { id: 'bsVinInput', action: handleBsSearch },
      { id: 'bsMasterInput', action: handleMasterStatsSearch }
    ];

    inputs.forEach(item => {
      const el = document.getElementById(item.id);
      if (el) {
        el.addEventListener('keypress', function (e) {
          if (e.key === 'Enter') {
            item.action();
          }
        });
      }
    });
  }

  /**
   * 뒤로가기 버튼 대응 (popstate)
   */
  window.onpopstate = function (event) {
    if (event.state) {
      if (event.state.view === 'main') {
        showMain();
      } else if (event.state.view === 'bsSearch') {
        showBsSearchView();
      } else if (event.state.view === 'branchAddress') {
        showBranchAddressView();
      } else if (event.state.view === 'delivery') {
        showDeliveryView();
      } else if (event.state.view === 'login') {
        showLogin();
      }
    } else {
      // 상태가 없으면 메인 또는 로그인으로
      if (userPermissions) showMain();
      else showLogin();
    }
  };

  // 초기 실행
  window.onload = function () {
    setupEnterKey();
    // 초기 히스토리 상태 설정
    history.replaceState({ view: 'login' }, 'Login');
  };

  // ==========================================
  // 배차 관리 (Delivery Management) 기능 로직
  // ==========================================
  const deliveryBranchOptionsCache = {};
  
  function showDeliveryView() {
    document.getElementById('mainView').style.display = 'none';
    document.getElementById('bsSearchView').style.display = 'none';
    document.getElementById('branchAddressView').style.display = 'none';
    document.getElementById('deliveryView').style.display = 'block';

    if (history.state?.view !== 'delivery') {
      history.pushState({ view: 'delivery' }, 'Delivery Management');
    }

    resetDeliveryApplyForm();
    renderDeliveryTabs();
  }

  function renderDeliveryTabs() {
    const tabsContainer = document.getElementById('deliveryTabs');
    tabsContainer.innerHTML = '';
    
    // permissions: userPermissions.delivery = [J열, K열, L열]
    const applyPerm = userPermissions.delivery[0] === 'O' || userPermissions.delivery[0] === 'o'; // J열: 신청
    const approvePerm = userPermissions.delivery[1] === 'O' || userPermissions.delivery[1] === 'o'; // K열: 승인
    const listPerm = userPermissions.delivery[2] === 'O' || userPermissions.delivery[2] === 'o'; // L열: 목록

    let firstActiveTab = null;

    if (applyPerm) {
      tabsContainer.innerHTML += `<div class="tab-item" id="tabDeliveryApply" onclick="switchDeliveryTab('apply')">배차 신청</div>`;
      if (!firstActiveTab) firstActiveTab = 'apply';
    }
    if (approvePerm) {
      tabsContainer.innerHTML += `<div class="tab-item" id="tabDeliveryApprove" onclick="switchDeliveryTab('approve')">승인 대기</div>`;
      if (!firstActiveTab) firstActiveTab = 'approve';
    }
    if (listPerm) {
      tabsContainer.innerHTML += `<div class="tab-item" id="tabDeliveryList" onclick="switchDeliveryTab('list')">전체 목록</div>`;
      if (!firstActiveTab) firstActiveTab = 'list';
    }

    // 초기 화면 이름 자동 설정 (임시)
    const nameInput = document.getElementById('applyName');
    if(nameInput && userPermissions) {
       nameInput.value = document.getElementById('userNameDisplay').innerText || '기본사용자';
    }

    if (firstActiveTab) {
      switchDeliveryTab(firstActiveTab);
      initDeliveryApplyForm();
    } else {
      tabsContainer.innerHTML = '<div style="padding:16px; color:#888;">접근 권한이 없습니다.</div>';
    }
  }

  function switchDeliveryTab(tabId) {
    document.querySelectorAll('#deliveryTabs .tab-item').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('#deliveryView .bs-section').forEach(el => el.style.display = 'none');

    const activeTab = document.getElementById('tabDelivery' + tabId.charAt(0).toUpperCase() + tabId.slice(1));
    if (activeTab) activeTab.classList.add('active');

    if (tabId === 'apply') {
      document.getElementById('deliveryApplySection').style.display = 'block';
      initDeliveryApplyForm();
    } else if (tabId === 'approve') {
      document.getElementById('deliveryApproveSection').style.display = 'block';
      loadDeliveryApprovals();
    } else if (tabId === 'list') {
      document.getElementById('deliveryListSection').style.display = 'block';
      loadDeliveryList();
    }
  }

  function initDeliveryApplyForm() {
    const nameInput = document.getElementById('applyName');
    if (nameInput) {
      nameInput.value = document.getElementById('userNameDisplay').innerText || '기본사용자';
    }

    const dateInput = document.getElementById('applyDate');
    if (dateInput && !dateInput.value) {
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, '0');
      const day = String(today.getDate()).padStart(2, '0');
      dateInput.value = `${year}-${month}-${day}`;
    }
  }

  function resetDeliveryApplyForm() {
    const nameInput = document.getElementById('applyName');
    if (nameInput) {
      nameInput.value = document.getElementById('userNameDisplay').innerText || '기본사용자';
    }

    document.getElementById('applyCategory').value = '';
    document.getElementById('applyCategoryCustom').value = '';
    document.getElementById('applyCategoryCustom').style.display = 'none';
    document.getElementById('applyOriginPart').value = '';
    document.getElementById('applyOriginBranch').innerHTML = '<option value="">영업점을 선택하세요</option>';
    document.getElementById('applyOriginAddress').value = '';
    document.getElementById('applyOriginManual').value = '';
    document.getElementById('applyContents').value = '';
    document.getElementById('applyDestPart').value = '';
    document.getElementById('applyDestBranch').innerHTML = '<option value="">영업점을 선택하세요</option>';
    document.getElementById('applyDestAddress').value = '';
    document.getElementById('applyDestManual').value = '';
    document.getElementById('applyDate').value = '';
    document.getElementById('applyNote').value = '';
  }

  function handleDeliveryCategoryChange() {
    const categoryEl = document.getElementById('applyCategory');
    const customEl = document.getElementById('applyCategoryCustom');
    const isCustom = String(categoryEl.value || '').trim() === '직접 입력';
    customEl.style.display = isCustom ? 'block' : 'none';
    if (!isCustom) customEl.value = '';
  }

  function getDeliveryDomMap(type) {
    if (type === 'origin') {
      return {
        partId: 'applyOriginPart',
        branchId: 'applyOriginBranch',
        addressId: 'applyOriginAddress'
      };
    }
    return {
      partId: 'applyDestPart',
      branchId: 'applyDestBranch',
      addressId: 'applyDestAddress'
    };
  }

  function handleDeliveryPartChange(type) {
    const domMap = getDeliveryDomMap(type);
    const partEl = document.getElementById(domMap.partId);
    const branchEl = document.getElementById(domMap.branchId);
    const addressEl = document.getElementById(domMap.addressId);
    const selectedPart = String(partEl.value || '').trim();

    branchEl.innerHTML = '<option value="">영업점을 선택하세요</option>';
    addressEl.value = '';

    if (!selectedPart) return;

    if (deliveryBranchOptionsCache[selectedPart]) {
      renderDeliveryBranchOptions(branchEl, deliveryBranchOptionsCache[selectedPart]);
      return;
    }

    showLoading();
    google.script.run
      .withSuccessHandler(function (res) {
        hideLoading();
        if (!res || !res.success) {
          alert((res && res.message) ? res.message : '영업점 목록을 불러오지 못했습니다.');
          return;
        }
        deliveryBranchOptionsCache[selectedPart] = res.items || [];
        renderDeliveryBranchOptions(branchEl, deliveryBranchOptionsCache[selectedPart]);
      })
      .withFailureHandler(function (err) {
        hideLoading();
        alert('영업점 목록 조회 실패: ' + err);
      })
      .getDeliveryBranchOptionsByPart(selectedPart);
  }

  function renderDeliveryBranchOptions(branchEl, items) {
    branchEl.innerHTML = '<option value="">영업점을 선택하세요</option>';
    if (!items || items.length === 0) {
      branchEl.innerHTML = '<option value="">해당 파트 영업점이 없습니다</option>';
      return;
    }

    items.forEach(function (item) {
      const option = document.createElement('option');
      option.value = item.branch;
      option.textContent = item.branch;
      option.dataset.address = item.address || '';
      branchEl.appendChild(option);
    });
  }

  function handleDeliveryBranchChange(type) {
    const domMap = getDeliveryDomMap(type);
    const branchEl = document.getElementById(domMap.branchId);
    const addressEl = document.getElementById(domMap.addressId);
    const selected = branchEl.options[branchEl.selectedIndex];

    if (!selected || !selected.value) {
      addressEl.value = '';
      return;
    }
    addressEl.value = selected.dataset.address || '';
  }

  function submitDeliveryApply() {
    const payload = {
      requesterName: String(document.getElementById('applyName').value || '').trim(),
      category: String(document.getElementById('applyCategory').value || '').trim(),
      categoryCustom: String(document.getElementById('applyCategoryCustom').value || '').trim(),
      originPart: String(document.getElementById('applyOriginPart').value || '').trim(),
      originBranch: String(document.getElementById('applyOriginBranch').value || '').trim(),
      originAddress: String(document.getElementById('applyOriginAddress').value || '').trim(),
      originManual: String(document.getElementById('applyOriginManual').value || '').trim(),
      contents: String(document.getElementById('applyContents').value || '').trim(),
      destPart: String(document.getElementById('applyDestPart').value || '').trim(),
      destBranch: String(document.getElementById('applyDestBranch').value || '').trim(),
      destAddress: String(document.getElementById('applyDestAddress').value || '').trim(),
      destManual: String(document.getElementById('applyDestManual').value || '').trim(),
      preferredDate: String(document.getElementById('applyDate').value || '').trim(),
      note: String(document.getElementById('applyNote').value || '').trim()
    };

    if (!payload.requesterName) {
      alert('요청자명이 확인되지 않습니다. 다시 로그인 후 시도해주세요.');
      return;
    }
    if (!payload.category) {
      alert('분류를 선택해주세요.');
      return;
    }
    if (payload.category === '직접 입력' && !payload.categoryCustom) {
      alert('분류 직접 입력값을 입력해주세요.');
      return;
    }
    if (!payload.originPart || !payload.originBranch || !payload.originAddress) {
      alert('출발지의 파트/영업점을 선택해주세요.');
      return;
    }
    if (!payload.destPart || !payload.destBranch || !payload.destAddress) {
      alert('목적지의 파트/영업점을 선택해주세요.');
      return;
    }
    if (!payload.preferredDate) {
      alert('배차 희망일을 선택해주세요.');
      return;
    }

    showLoading();
    google.script.run
      .withSuccessHandler(function (res) {
        hideLoading();
        if (!res || !res.success) {
          alert((res && res.message) ? res.message : '배차 신청 저장에 실패했습니다.');
          return;
        }
        alert('배차 신청이 저장되었습니다.');
        resetDeliveryApplyForm();
        initDeliveryApplyForm();
      })
      .withFailureHandler(function (err) {
        hideLoading();
        alert('배차 신청 저장 실패: ' + err);
      })
      .saveDeliveryApply(payload);
  }

  function loadDeliveryApprovals() {
    document.getElementById('deliveryApproveResults').innerHTML = `
      <div class="empty-state">
        <span class="material-icons">hourglass_empty</span>
        <p>승인 대기중인 배차가 없습니다.</p>
      </div>`;
  }
  function loadDeliveryList() {
    document.getElementById('deliveryListResults').innerHTML = `
      <div class="empty-state">
        <span class="material-icons">list_alt</span>
        <p>배차 현황 목록이 없습니다.</p>
      </div>`;
  }

  /**
   * 바코드 촬영 트리거
   */
  function triggerCamera() {
    document.getElementById('directBarcodeCamera').click();
  }

  /**
   * 촬영된 사진에서 바코드 인식 (네이티브 BarcodeDetector 방식)
   */
  function handleDirectBarcodeFile(input) {
    if (input.files && input.files.length > 0) {
      const imageFile = input.files[0];
      showLoading();

      const reader = new FileReader();
      reader.onload = function (e) {
        const img = new Image();
        img.onload = function () {
          const canvas = document.getElementById('barcodeCanvas');
          const ctx = canvas.getContext('2d');

          // 이미지 크기 최적화 (인식률 향상을 위해 최대 1200px)
          const maxSize = 1200;
          let width = img.width;
          let height = img.height;

          if (width > height) {
            if (width > maxSize) {
              height *= maxSize / width;
              width = maxSize;
            }
          } else {
            if (height > maxSize) {
              width *= maxSize / height;
              height = maxSize;
            }
          }

          canvas.width = width;
          canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);

          detectBarcodeFromCanvas(canvas, input);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(imageFile);
    }
  }

  /**
   * 캔버스에서 바코드 검출 및 서버 조회
   */
  function detectBarcodeFromCanvas(canvas, input) {
    // 1. BarcodeDetector API 지원 확인 (Chrome Android 등 프리미엄 환경)
    if ('BarcodeDetector' in window) {
      const detector = new BarcodeDetector({
        formats: ['code_128', 'code_39', 'ean_13', 'ean_8', 'qr_code']
      });

      detector.detect(canvas)
        .then(barcodes => {
          if (barcodes.length > 0) {
            const barcode = barcodes[0].rawValue;
            console.log("Native Scan Success:", barcode);
            if (navigator.vibrate) navigator.vibrate(100);
            callLookupBarcode(barcode, input);
          } else {
            hideLoading();
            handleScanFallback("바코드를 자동 인식할 수 없습니다.", input);
          }
        })
        .catch(err => {
          hideLoading();
          console.error("Native detector error:", err);
          handleScanFallback("인식 오류가 발생했습니다.", input);
        });
    } else {
      // 2. 미지원 환경 (iOS 등) 수동 입력 폴백
      hideLoading();
      handleScanFallback("자동 인식이 지원되지 않는 브라우저입니다.", input);
    }
  }

  /**
   * 스캔 실패 또는 미지원 시 수동 입력 폴백
   */
  function handleScanFallback(reason, input) {
    const barcode = prompt(`${reason}\n사진에 보이는 바코드 번호를 직접 입력해주세요:`);
    if (barcode && barcode.trim()) {
      showLoading();
      callLookupBarcode(barcode.trim(), input);
    } else {
      input.value = "";
    }
  }

  /**
   * 서버에 바코드 매칭 요청
   */
  function callLookupBarcode(barcode, input) {
    google.script.run
      .withSuccessHandler(function (res) {
        hideLoading();
        input.value = "";
        if (res.found) {
          document.getElementById('bsVinInput').value = res.vin;
          handleBsSearch(); // 자동 검색 실행
        } else {
          alert(res.error || "등록되지 않은 바코드입니다.");
        }
      })
      .withFailureHandler(function (err) {
        hideLoading();
        input.value = "";
        alert("바코드 조회 중 오류가 발생했습니다: " + err);
      })
      .lookupBarcode(barcode);
  }
</script>
