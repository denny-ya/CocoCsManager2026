    <div style="background:#fff; padding:24px; border-radius:12px; width:85%; max-width:320px; box-shadow:0 10px 25px rgba(0,0,0,0.15); font-family:inherit;">

        <div style="display:flex; gap:10px;">
            <button id="customModalBtnCancel" style="display:none; flex:1; padding:12px; border:none; background:#f0f2f5; border-radius:8px; cursor:pointer; color:#4b5b70; font-weight:700; font-size:14px;" onclick="customModalClose(false)">취소</button>
            <button id="customModalBtnOk" style="flex:1; padding:12px; border:none; background:#0051A2; color:#fff; border-radius:8px; cursor:pointer; font-weight:700; font-size:14px;" onclick="customModalClose(true)">확인</button>
        </div>
    </div>
  </div>

  <!-- 공통 입력(Prompt) 모달 -->
  <div id="customPromptOverlay" style="display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center;">
    <div style="background:#fff; padding:24px; border-radius:12px; width:85%; max-width:320px; box-shadow:0 10px 25px rgba(0,0,0,0.15); font-family:inherit;">

        <input type="text" id="customPromptInput" style="width:100%; padding:12px; margin-bottom:24px; border:1px solid #d5deea; border-radius:8px; font-size:14px; box-sizing:border-box; outline:none;" onkeypress="if(event.key==='Enter') customPromptClose(true)">
        <div style="display:flex; gap:10px;">
            <button style="flex:1; padding:12px; border:none; background:#f0f2f5; border-radius:8px; cursor:pointer; color:#4b5b70; font-weight:700; font-size:14px;" onclick="customPromptClose(false)">취소</button>
            <button style="flex:1; padding:12px; border:none; background:#0051A2; color:#fff; border-radius:8px; cursor:pointer; font-weight:700; font-size:14px;" onclick="customPromptClose(true)">확인</button>
        </div>

        <button class="btn btn-text" onclick="showLogin()">
